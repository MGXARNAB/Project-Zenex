<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>ZenexClock™</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{ -webkit-font-smoothing:antialiased; }
body{font-family:'Inter',sans-serif; background:#07070B; overscroll-behavior:none;}
.mono{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{display:none}
.blob{will-change:transform; transform:translateZ(0)}
@keyframes f1{0%,100%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(70px,-50px,0) scale(1.08)}}
@keyframes f2{0%,100%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(-60px,40px,0) scale(1.05)}}
.a1{animation:f1 20s ease-in-out infinite}
.a2{animation:f2 24s ease-in-out infinite}
.glass{-webkit-backdrop-filter:blur(20px); backdrop-filter:blur(20px);}
.hand{will-change:transform; transform-origin:bottom center; transform:translateZ(0); backface-visibility:hidden}
.tick{transform-origin:center}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;
const {motion,AnimatePresence}=window.Motion;

function AnalogClock({smooth}){
  const secRef=useRef(null);
  const minRef=useRef(null);
  const hourRef=useRef(null);
  const raf=useRef(null);
  useEffect(()=>{
    const upd=()=>{
      const n=new Date();
      const ms=n.getMilliseconds();
      const s=n.getSeconds()+ms/1000;
      const m=n.getMinutes()+s/60;
      const h=(n.getHours()%12)+m/60;
      if(secRef.current) secRef.current.style.transform=`translateX(-50%) rotate(${s*6}deg)`;
      if(minRef.current) minRef.current.style.transform=`translateX(-50%) rotate(${m*6}deg)`;
      if(hourRef.current) hourRef.current.style.transform=`translateX(-50%) rotate(${h*30}deg)`;
      raf.current=requestAnimationFrame(upd);
    };
    raf.current=requestAnimationFrame(upd);
    return()=>cancelAnimationFrame(raf.current);
  },[]);
  return(
    <div className="relative w-[260px] h-[260px] sm:w-[300px] sm:h-[300px] rounded-full bg-[#0B0B10] border border-white/[0.08] shadow-[inset_0_2px_24px_rgba(0,0,0,0.8),inset_0_1px_0_0_rgba(255,255,255,0.06)]">
      <svg viewBox="0 0 300 300" className="absolute inset-0 w-full h-full pointer-events-none">
        {Array.from({length:60}).map((_,i)=>{
          const isHour=i%5===0;
          const r1=isHour?132:138;
          const r2=146;
          const rad=(i*6*Math.PI)/180;
          const x1=150+r1*Math.sin(rad);
          const y1=150-r1*Math.cos(rad);
          const x2=150+r2*Math.sin(rad);
          const y2=150-r2*Math.cos(rad);
          return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={isHour?"rgba(255,255,255,0.85)":"rgba(255,255,255,0.12)"} strokeWidth={isHour?2:0.8} strokeLinecap="round"/>
        })}
        <circle cx="150" cy="150" r="4" fill="white"/>
      </svg>
      <div ref={hourRef} className="hand absolute left-1/2 bottom-1/2 w-[6px] h-[72px] -ml-[3px] bg-gradient-to-b from-white to-white/70 rounded-full origin-bottom shadow-[0_2px_10px_rgba(255,255,255,0.2)]"/>
      <div ref={minRef} className="hand absolute left-1/2 bottom-1/2 w-[4px] h-[108px] -ml-[2px] bg-white/90 rounded-full origin-bottom"/>
      <div ref={secRef} className="hand absolute left-1/2 bottom-1/2 w-[2px] h-[122px] -ml-[1px] origin-bottom">
        <div className="w-full h-[88%] bg-gradient-to-b from-red-400 to-red-500 rounded-full shadow-[0_0_12px_rgba(239,68,68,0.7)]"/>
        <div className="absolute -bottom-[14px] left-1/2 -translate-x-1/2 w-[10px] h-[10px] rounded-full bg-red-500 border-[2px] border-[#0B0B10] shadow"/>
      </div>
      <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-3 h-3 rounded-full bg-white shadow-[0_0_0_4px_rgba(0,0,0,0.5)] z-10"/>
    </div>
  );
}

function DigitalClock(){
  const [now,setNow]=useState(new Date());
  useEffect(()=>{const id=setInterval(()=>setNow(new Date()),1000); return()=>clearInterval(id)},[]);
  return(
    <div className="text-center">
      <p className="mono text-[42px] sm:text-[48px] font-[700] tracking-[-0.04em] text-white leading-none">{now.toLocaleTimeString('en-GB',{hour12:false})}</p>
      <p className="text-[13px] font-[600] text-white/40 mt-2 tracking-wide">{now.toLocaleDateString('en-US',{weekday:'long', month:'long', day:'numeric', year:'numeric'})}</p>
    </div>
  );
}

const WORLD=[
  {name:"Durgapur", tz:"Asia/Kolkata", flag:"🇮🇳"},
  {name:"London", tz:"Europe/London", flag:"🇬🇧"},
  {name:"New York", tz:"America/New_York", flag:"🇺🇸"},
  {name:"Tokyo", tz:"Asia/Tokyo", flag:"🇯🇵"},
  {name:"Dubai", tz:"Asia/Dubai", flag:"🇦🇪"},
  {name:"Sydney", tz:"Australia/Sydney", flag:"🇦🇺"},
];

function WorldPanel(){
  const [tick,setTick]=useState(0);
  const [cities,setCities]=useState(()=>{
    try{ const s=localStorage.getItem('zenex_world'); if(s) return JSON.parse(s); }catch{}
    return WORLD;
  });
  const [showAdd,setShowAdd]=useState(false);
  const [newName,setNewName]=useState("");
  const [newTz,setNewTz]=useState("Asia/Kolkata");
  const allZones=useMemo(()=>{
    try{ if(Intl.supportedValuesOf) return Intl.supportedValuesOf('timeZone'); }catch{}
    return ["Asia/Kolkata","Europe/London","America/New_York","Asia/Tokyo","Asia/Dubai","Australia/Sydney","Europe/Paris","America/Los_Angeles","Asia/Singapore","Europe/Berlin","Asia/Dhaka","Pacific/Auckland"];
  },[]);
  useEffect(()=>{const id=setInterval(()=>setTick(t=>t+1),1000); return()=>clearInterval(id)},[]);
  useEffect(()=>{ try{ localStorage.setItem('zenex_world',JSON.stringify(cities)); }catch{} },[cities]);
  const now=new Date();
  const addCity=()=>{
    const name=newName.trim();
    if(!name || !newTz) return;
    if(cities.some(c=>c.tz===newTz)) return;
    setCities([...cities,{name, tz:newTz, flag:"🌍"}]);
    setNewName(""); setShowAdd(false);
  };
  const removeCity=(tz)=>{ setCities(cities.filter(c=>c.tz!==tz)); };
  return(
    <div className="w-full">
      <div className="flex items-center justify-between mb-4">
        <p className="text-[12px] font-[600] text-white/40">{cities.length} cities • Live</p>
        <button onClick={()=>setShowAdd(!showAdd)} className={`h-8 px-3.5 rounded-full text-[11px] font-[600] border transition ${showAdd?"bg-white text-black border-white":"bg-white/5 text-white/70 border-white/10 hover:bg-white/10"}`}>{showAdd?"Close":"＋ Add City"}</button>
      </div>
      {showAdd && (
        <div className="mb-4 rounded-[16px] bg-black/30 border border-white/10 p-3.5 flex flex-col gap-3">
          <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="City name (e.g. Paris)" className="h-10 rounded-[10px] bg-white/[0.06] border border-white/10 px-3 text-[13px] text-white placeholder:text-white/30 outline-none focus:border-white/20"/>
          <select value={newTz} onChange={e=>setNewTz(e.target.value)} className="h-10 rounded-[10px] bg-[#12121A] border border-white/10 px-3 text-[13px] text-white outline-none focus:border-white/20">
            {allZones.map(z=><option key={z} value={z} className="bg-[#12121A]">{z}</option>)}
          </select>
          <button onClick={addCity} className="h-10 rounded-[12px] bg-white text-black font-[600] text-[12px] hover:bg-white/90">Add City</button>
        </div>
      )}
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
        {cities.map(c=>{
          let time="--:--:--";
          try{ time=new Intl.DateTimeFormat('en-GB',{timeZone:c.tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(now); }catch{}
          const h=parseInt((time.split(':')[0]||"12"),10);
          const isDay=h>=6&&h<18;
          return(
            <div key={c.tz} className="group relative rounded-[18px] bg-white/[0.05] border border-white/[0.07] p-4 flex items-center justify-between hover:bg-white/[0.07] transition">
              <div className="flex items-center gap-3">
                <div className={`w-9 h-9 rounded-[10px] grid place-items-center text-[15px] ${isDay?"bg-amber-400/15 border border-amber-400/20":"bg-indigo-500/15 border border-indigo-400/20"}`}>{c.flag||"🌍"}</div>
                <div><p className="text-[13px] font-[600] text-white">{c.name}</p><p className="text-[11px] text-white/40 truncate max-w-[110px]">{c.tz}</p></div>
              </div>
              <div className="text-right">
                <p className="mono text-[16px] font-[600] text-white leading-none">{time}</p>
                <p className="text-[10px] text-white/30 mt-1">{isDay?"Day":"Night"}</p>
                <button onClick={()=>removeCity(c.tz)} className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 w-5 h-5 rounded-full bg-white/10 grid place-items-center text-white/50 hover:text-white hover:bg-white/15 transition">✕</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Stopwatch(){
  const [running,setRunning]=useState(false);
  const [elapsed,setElapsed]=useState(0);
  const [laps,setLaps]=useState([]);
  const startRef=useRef(0);
  const accRef=useRef(0);
  const raf=useRef(null);
  useEffect(()=>{
    if(!running) return;
    startRef.current=Date.now();
    const loop=()=>{
      setElapsed(accRef.current + (Date.now()-startRef.current));
      raf.current=requestAnimationFrame(loop);
    };
    raf.current=requestAnimationFrame(loop);
    return()=>cancelAnimationFrame(raf.current);
  },[running]);
  const toggle=()=>{
    if(running){ accRef.current=elapsed; setRunning(false); }
    else { setRunning(true); }
  };
  const reset=()=>{ setRunning(false); setElapsed(0); accRef.current=0; setLaps([]); };
  const lap=()=>{ if(!running) return; setLaps(l=>[elapsed,...l]); };
  const fmt=(ms)=>{
    const m=Math.floor(ms/60000);
    const s=Math.floor((ms%60000)/1000);
    const cs=Math.floor((ms%1000)/10);
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
  };
  return(
    <div className="flex flex-col items-center">
      <p className="mono text-[48px] sm:text-[56px] font-[700] tracking-[-0.04em] text-white">{fmt(elapsed)}</p>
      <div className="flex gap-3 mt-6">
        <button onClick={reset} className="h-11 px-6 rounded-full bg-white/10 border border-white/10 text-white/70 text-[13px] font-[600] hover:bg-white/15">Reset</button>
        <button onClick={toggle} className={`h-11 px-8 rounded-full font-[700] text-[13px] shadow ${running?"bg-red-500 text-white shadow-red-500/20":"bg-white text-black shadow-white/20"}`}>{running?"Pause":"Start"}</button>
        <button onClick={lap} className="h-11 px-6 rounded-full bg-white/10 border border-white/10 text-white/70 text-[13px] font-[600] hover:bg-white/15 disabled:opacity-30" disabled={!running}>Lap</button>
      </div>
      {laps.length>0 && (
        <div className="w-full mt-6 rounded-[16px] bg-black/20 border border-white/5 overflow-hidden max-h-[180px] overflow-y-auto">
          {laps.map((l,i)=><div key={i} className="flex justify-between px-4 py-2.5 text-[12px] border-b border-white/[0.04] last:border-0"><span className="text-white/30 font-[600]">Lap {laps.length-i}</span><span className="mono text-white/80">{fmt(l)}</span></div>)}
        </div>
      )}
    </div>
  );
}

function Timer(){
  const [dur,setDur]=useState(5*60);
  const [rem,setRem]=useState(5*60);
  const [run,setRun]=useState(false);
  const [presets]=useState([60,300,600,1500]);
  const interval=useRef(null);
  const audioCtx=useRef(null);

  useEffect(()=>{
    if(!run) return;
    interval.current=setInterval(()=>{
      setRem(r=>{
        if(r<=1){ setRun(false); if(navigator.vibrate) navigator.vibrate([200,100,200]); try{ const ctx=new (window.AudioContext||window.webkitAudioContext)(); const o=ctx.createOscillator(); o.frequency.value=880; o.connect(ctx.destination); o.start(); setTimeout(()=>o.stop(),600);}catch{} return 0; }
        return r-1;
      });
    },1000);
    return()=>clearInterval(interval.current);
  },[run]);

  const progress= dur>0? rem/dur :0;
  const circ=2*Math.PI*112;
  const dash=circ*progress;

  const setFromInputs=(h,m,s)=>{ const tot=h*3600+m*60+s; if(tot>0){ setDur(tot); setRem(tot); } };

  const [h,setH]=useState(0);
  const [mm,setMm]=useState(5);
  const [ss,setSs]=useState(0);

  useEffect(()=>{ setFromInputs(h,mm,ss); },[h,mm,ss]);

  const fmt=(sec)=>{ const hh=Math.floor(sec/3600); const mm=Math.floor((sec%3600)/60); const ss=sec%60; return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`; };

  return(
    <div className="flex flex-col items-center">
      <div className="relative w-[240px] h-[240px]">
        <svg viewBox="0 0 240 240" className="absolute inset-0 w-full h-full -rotate-90">
          <circle cx="120" cy="120" r="112" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="8"/>
          <circle cx="120" cy="120" r="112" fill="none" stroke="white" strokeWidth="8" strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ-dash} style={{transition: run?'stroke-dashoffset 1s linear':'none'}}/>
        </svg>
        <div className="absolute inset-0 grid place-items-center">
          <div className="text-center">
            <p className="mono text-[32px] font-[700] text-white tracking-[-0.02em]">{fmt(rem)}</p>
            <p className="text-[10px] font-[700] tracking-[0.14em] uppercase text-white/30 mt-1">{run?"Running":"Paused"}</p>
          </div>
        </div>
      </div>

      <div className="flex gap-2 mt-6">
        {[1,5,10,25].map(m=><button key={m} onClick={()=>{const s=m*60; setDur(s); setRem(s); setH(0); setMm(m); setSs(0);}} className={`h-8 px-3.5 rounded-full border text-[11px] font-[600] ${dur===m*60?"bg-white text-black border-white":"bg-white/5 text-white/60 border-white/10 hover:bg-white/10"}`}>{m}m</button>)}
      </div>

      <div className="flex items-center gap-2 mt-4">
        <input type="number" value={h} onChange={e=>setH(Math.max(0,Math.min(99,parseInt(e.target.value)||0)))} className="w-[56px] h-10 rounded-[12px] bg-white/[0.06] border border-white/10 text-center text-white mono text-[14px] outline-none"/>
        <span className="text-white/20">:</span>
        <input type="number" value={mm} onChange={e=>setMm(Math.max(0,Math.min(59,parseInt(e.target.value)||0)))} className="w-[56px] h-10 rounded-[12px] bg-white/[0.06] border border-white/10 text-center text-white mono text-[14px] outline-none"/>
        <span className="text-white/20">:</span>
        <input type="number" value={ss} onChange={e=>setSs(Math.max(0,Math.min(59,parseInt(e.target.value)||0)))} className="w-[56px] h-10 rounded-[12px] bg-white/[0.06] border border-white/10 text-center text-white mono text-[14px] outline-none"/>
      </div>

      <div className="flex gap-3 mt-6">
        <button onClick={()=>{setRun(false); setRem(dur);}} className="h-11 px-6 rounded-full bg-white/10 border border-white/10 text-white/70 text-[13px] font-[600]">Reset</button>
        <button onClick={()=>setRun(!run)} className={`h-11 px-8 rounded-full font-[700] text-[13px] ${run?"bg-white/10 border border-white/10 text-white":"bg-white text-black"}`}>{run?"Pause":"Start"}</button>
      </div>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("clock");
  const tabs=[
    {id:"clock", label:"Clock", icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>},
    {id:"world", label:"World", icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></svg>},
    {id:"stopwatch", label:"Stopwatch", icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M15 9l-3 3"/><path d="M9 2h6"/></svg>},
    {id:"timer", label:"Timer", icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2a8 8 0 0 0-8 8c0 5 8 12 8 12s8-7 8-12a8 8 0 0 0-8-8z"/><circle cx="12" cy="10" r="2"/></svg>},
  ];

  return(
    <div className="min-h-[100dvh] w-full flex items-center justify-center p-3 sm:p-6 relative overflow-hidden bg-[#07070B]">
      <div className="absolute inset-0 -z-10 overflow-hidden pointer-events-none">
        <div className="absolute w-[760px] h-[760px] rounded-full blur-[90px] -top-[220px] -left-[200px] bg-violet-600/24 blob a1"/>
        <div className="absolute w-[720px] h-[720px] rounded-full blur-[90px] -bottom-[220px] -right-[200px] bg-indigo-600/18 blob a2"/>
      </div>

      <motion.div initial={{opacity:0,y:12}} animate={{opacity:1,y:0}} transition={{duration:0.45}} className="glass w-full max-w-[420px] rounded-[28px] border border-white/[0.08] bg-[#11111A]/85 shadow-[0_24px_80px_-24px_rgba(0,0,0,0.85)] overflow-hidden flex flex-col">
        <div className="h-[62px] px-5 flex items-center justify-between border-b border-white/[0.07] bg-black/20">
          <div className="flex items-center gap-2.5">
            <div className="w-8 h-8 rounded-[10px] bg-white text-black grid place-items-center">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
            </div>
            <span className="text-[14px] font-[700] tracking-[-0.02em] text-white">ZenexClock™</span>
          </div>
          <div className="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(16,185,129,0.6)] animate-pulse"/>
        </div>

        <div className="p-2">
          <div className="flex gap-1.5 p-1 rounded-full bg-black/30 border border-white/[0.06]">
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} className={`flex-1 h-9 rounded-full flex items-center justify-center gap-1.5 text-[12px] font-[600] transition-all ${tab===t.id?"bg-white text-black shadow":"text-white/50 hover:text-white/80 hover:bg-white/5"}`}>
                {t.icon}<span className="hidden sm:inline">{t.label}</span>
              </button>
            ))}
          </div>
        </div>

        <div className="p-6 sm:p-7 min-h-[420px] flex flex-col items-center justify-center">
          <AnimatePresence mode="wait">
            <motion.div key={tab} initial={{opacity:0,y:8}} animate={{opacity:1,y:0}} exit={{opacity:0,y:-8}} transition={{duration:0.22}} className="w-full flex flex-col items-center">
              {tab==="clock" && <><AnalogClock/><div className="mt-8"><DigitalClock/></div></>}
              {tab==="world" && <WorldPanel/>}
              {tab==="stopwatch" && <Stopwatch/>}
              {tab==="timer" && <Timer/>}
            </motion.div>
          </AnimatePresence>
        </div>

        <div className="h-4"/>
      </motion.div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
