<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Zenex Launcher</title>
  <style>
    :root {
      --ink: #f7fbff;
      --glass: rgba(255, 255, 255, .11);
      --glass-hover: rgba(255, 255, 255, .19);
      --line: rgba(255, 255, 255, .22);
      --shadow: rgba(0, 0, 0, .28);
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; margin: 0; }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--ink);
      background: #11152d;
      font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before,
    body::after {
      position: fixed;
      z-index: -1;
      width: 42vmax;
      height: 42vmax;
      border-radius: 50%;
      content: "";
      filter: blur(70px);
      opacity: .65;
      pointer-events: none;
    }

    body::before {
      top: -18vmax;
      left: -12vmax;
      background: #7658ff;
    }

    body::after {
      right: -14vmax;
      bottom: -20vmax;
      background: #08b8c6;
    }

    main {
      display: grid;
      place-items: center;
      width: min(92vw, 620px);
      min-height: 100vh;
      padding: 2rem;
    }

    /* ===== Branding (top-left) — added ===== */
    .brand {
      position: fixed;
      top: clamp(1.1rem, 3.5vw, 2rem);
      left: clamp(1.1rem, 3.5vw, 2.4rem);
      z-index: 2;
      display: grid;
      gap: .2rem;
      pointer-events: none;
      user-select: none;
    }

    .brand-logo {
      margin: 0;
      font-size: clamp(2.1rem, 6vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -.045em;
      line-height: 1;
      background: linear-gradient(115deg, #ffffff 15%, #9eeaff 55%, #d4c6ff 95%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      filter: drop-shadow(0 8px 24px rgba(0, 0, 0, .35));
    }

    .brand-by {
      margin: .1rem 0 0;
      font-size: clamp(.8rem, 2vw, .95rem);
      font-weight: 600;
      font-style: italic;
      letter-spacing: .06em;
      color: rgba(255, 255, 255, .8);
    }

    /* Caption pill above the launcher card */
    .launcher-stack {
      display: grid;
      justify-items: center;
      width: 100%;
      gap: 1.1rem;
    }

    .launcher-caption {
      margin: 0;
      padding: .5rem 1.1rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: clamp(.78rem, 2.2vw, .92rem);
      font-weight: 500;
      letter-spacing: .03em;
      color: rgba(255, 255, 255, .75);
      background: var(--glass);
      backdrop-filter: blur(12px) saturate(135%);
      -webkit-backdrop-filter: blur(12px) saturate(135%);
    }

    .launcher {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      width: 100%;
      gap: clamp(.9rem, 2.5vw, 1.35rem);
      padding: clamp(1rem, 2.8vw, 1.4rem);
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 2rem;
      background: linear-gradient(135deg, rgba(255,255,255,.15), rgba(255,255,255,.045));
      box-shadow: 0 24px 70px var(--shadow), inset 0 1px 0 rgba(255,255,255,.2);
      backdrop-filter: blur(24px) saturate(135%);
      -webkit-backdrop-filter: blur(24px) saturate(135%);
    }

    .app-button {
      display: grid;
      place-items: center;
      aspect-ratio: 1;
      min-width: 0;
      min-height: clamp(6.5rem, 18vw, 9rem);
      padding: clamp(1rem, 3vw, 1.5rem);
      border: 1px solid var(--line);
      border-radius: 1.65rem;
      color: var(--ink);
      background: var(--glass);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.17), 0 8px 20px rgba(0,0,0,.1);
      cursor: pointer;
      text-decoration: none;
      transition: transform .22s ease, background .22s ease, box-shadow .22s ease;
    }

    .app-button:hover,
    .app-button:focus-visible {
      background: var(--glass-hover);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.28), 0 12px 28px rgba(0,0,0,.2);
      outline: none;
      transform: translateY(-5px);
    }

    .app-button:active { transform: translateY(-1px) scale(.97); }

    .app-button svg {
      width: min(58%, 5rem);
      height: min(58%, 5rem);
      overflow: visible;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 1.7;
      fill: none;
    }

    .app-label {
      margin-top: .35rem;
      font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: clamp(.78rem, 2vw, .98rem);
      font-weight: 600;
      letter-spacing: -.015em;
      line-height: 1;
      text-align: center;
      text-shadow: 0 1px 12px rgba(0, 0, 0, .2);
    }

    .app-button[data-app="weather"] { color: #9eeaff; }
    .app-button[data-app="clock"] { color: #d4c6ff; }
    .app-button[data-app="calculator"] { color: #b7f5d0; }
    .app-button[data-app="calendar"] { color: #ffd49b; }

    @media (max-width: 390px) {
      main { padding: 1rem; }
      .launcher { border-radius: 1.5rem; }
      .app-button { border-radius: 1rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .app-button { transition: none; }
    }
  </style>
</head>
<body>
  <header class="brand">
    <h1 class="brand-logo">Zenex Launcher</h1>
    <p class="brand-by">-By Arnab</p>
  </header>

  <main>
    <div class="launcher-stack">
      <p class="launcher-caption">Tap the app you want to open</p>
      <nav class="launcher" aria-label="App launcher">
      <!-- Replace each href with your GitHub Pages app URL. -->
      <a class="app-button" data-app="weather" href="https://mgxarnab.github.io/Project-Zenex/ZenexWeather" aria-label="Open Weather app" title="Weather app">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7.5 18.25h9.25a3.25 3.25 0 0 0 .43-6.47A5.75 5.75 0 0 0 6.1 10.9a3.7 3.7 0 0 0 1.4 7.35Z"/>
          <path d="M8 5.25v1.5M4.65 7.1l1.06 1.06M15.9 7.1l-1.06 1.06M4 12h1.5"/>
        </svg>
        <span class="app-label">Weather</span>
      </a>

      <a class="app-button" data-app="clock" href="https://mgxarnab.github.io/Project-Zenex/ZenexClock" aria-label="Open Clock app" title="Clock app">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="8.25"/>
          <path d="M12 7.5v5l3.25 2M9 2.8h6M12 2.8v1"/>
        </svg>
        <span class="app-label">Clock</span>
      </a>

      <a class="app-button" data-app="calculator" href="https://mgxarnab.github.io/Project-Zenex/ZenexCalculator" aria-label="Open Calculator app" title="Calculator app">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="5.25" y="2.75" width="13.5" height="18.5" rx="2.25"/>
          <rect x="8" y="5.5" width="8" height="3" rx=".65"/>
          <path d="M8.25 12.5h1.5M11.25 12.5h1.5M14.25 12.5h1.5M8.25 16h1.5M11.25 16h1.5M14.25 16h1.5"/>
        </svg>
        <span class="app-label">Calculator</span>
      </a>

      <a class="app-button" data-app="calendar" href="https://mgxarnab.github.io/Project-Zenex/ZenexCalender" aria-label="Open Calendar app" title="Calendar app">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="4" y="5.5" width="16" height="14.5" rx="2"/>
          <path d="M8 3.5v4M16 3.5v4M4 9.5h16M8 13h.01M12 13h.01M16 13h.01M8 16.5h.01M12 16.5h.01"/>
        </svg>
        <span class="app-label">Calendar</span>
      </a>
      </nav>
    </div>
  </main>
</body>
</html>
